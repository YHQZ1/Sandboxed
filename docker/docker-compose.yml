version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dojo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dojo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dojo}
      POSTGRES_DB: ${POSTGRES_DB:-dojo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dojo}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dojo-net

  redis:
    image: redis:7-alpine
    container_name: dojo_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dojo-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dojo_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-dojo}:${POSTGRES_PASSWORD:-dojo}@postgres:5432/${POSTGRES_DB:-dojo}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JUDGE_URL: http://judge:5001
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dojo-net

  judge:
    build:
      context: ../judge
      dockerfile: Dockerfile
    container_name: dojo_judge
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # required for sandbox containers
    networks:
      - dojo-net

volumes:
  postgres_data:

networks:
  dojo-net:
    driver: bridge