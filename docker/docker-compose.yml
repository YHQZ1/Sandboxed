version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dojo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dojo
      POSTGRES_PASSWORD: dojo
      POSTGRES_DB: dojo
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dojo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dojo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dojo_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://dojo:dojo@postgres:5432/dojo
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-this-to-a-random-secret
      JUDGE_URL: http://judge:5001
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src   # for development hot reload (optional)

  judge:
    build:
      context: ../judge
      dockerfile: Dockerfile
    container_name: dojo_judge
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # needed to run sandbox containers

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dojo_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_SOCKET_URL: http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres_data: