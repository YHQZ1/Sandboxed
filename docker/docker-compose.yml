version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sandboxed_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sandboxed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sandboxed}
      POSTGRES_DB: ${POSTGRES_DB:-sandboxed}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sandboxed}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sandboxed-net

  redis:
    image: redis:7-alpine
    container_name: sandboxed_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - sandboxed-net

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sandboxed_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sandboxed}:${POSTGRES_PASSWORD:-sandboxed}@postgres:5432/${POSTGRES_DB:-sandboxed}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JUDGE_URL: http://judge:5001
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sandboxed-net

  judge:
    build:
      context: ../judge
      dockerfile: Dockerfile
    container_name: sandboxed_judge
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    networks:
      - sandboxed-net

volumes:
  postgres_data:

networks:
  sandboxed-net:
    driver: bridge